---
layout: default
title: Art
description: Ceramics, woodworking, origami, and other hand-made things.
---

<div class="art-page">
  <h1>Art</h1>
  <p class="subtitle">Ceramics · Woodworking · Hand-made things</p>

  <div class="art-grid">
    {% for art_hash in site.data.art %}
      {% assign art = art_hash[1] %}
      <a class="art-tile"
         href="{{ art.url | relative_url }}"
         target="_blank"
         rel="noopener"
         aria-label="{{ art.title }} (opens full image in new tab)">
        <div class="thumb" style="background-image: url({{ art.url | relative_url }});"></div>
        <div class="caption">{{ art.title }}</div>
      </a>
    {% endfor %}
  </div>
</div>
