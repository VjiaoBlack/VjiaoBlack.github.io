<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — Victor Jiao{% else %}Victor Jiao{% endif %}</title>
  <meta name="description" content="{{ page.description | default: 'Senior software engineer building systems that feel alive.' }}">
  <meta name="view-transition" content="same-origin">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" type="text/css" href="/css/default.css">

<body>
  <div class="page">
    <header class="topbar">
      <a class="masthead" href="/">Victor Jiao</a>
      <div class="dateline">
        <a href="/#bio" class="dateline-link"><span>Vol.&nbsp;III</span></a>
        <span>San Francisco</span>
        <span>Apr 2026</span>
      </div>
      <nav class="topnav" aria-label="Main">
        <a href="/projects.html">Projects</a>
        <a href="/art.html">Art</a>
        <a href="/about.html">About</a>
        <a href="/res/victor_jiao_resume_2026_public.pdf">Résumé</a>

    </header>

    <main>
      {{ content }}
    </main>

    <footer class="colophon">
      <span>Set in Fraunces &amp; JetBrains Mono</span>
      <span>Hand-written CSS · OKLCH palette</span>
    </footer>
  </div>

  <script src="/scripts/default.js" defer></script>

</html>
